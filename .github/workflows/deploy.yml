name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # -----------------------
      # Checkout source + submodules
      # -----------------------
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # -----------------------
      # Install Hugo (Extended version)
      # -----------------------
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "latest"
          extended: true

      # -----------------------
      # Build the site
      # -----------------------
      - name: Build Hugo site
        run: hugo --minify

      # -----------------------
      # Deploy to gh-pages branch (force HTTPS)
      # -----------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          # Force HTTPS to fix 403 permission error
          remote_url: https://github.com/pirikli/pirikli.github.io.git
          # Optional: commit message for deploys
          commit_message: "Automated deploy: ${{ github.sha }}"
