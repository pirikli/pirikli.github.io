baseURL = "https://pirikli.github.io/"
languageCode = "en-us"
title = "Pirikli"
theme = "PaperMod"
defaultContentLanguage = "en"
relativeURLs = true
canonifyURLs = true

[params]
  author = "Pirikli"
  description = "Multilingual Communication Specialist working across Azerbaijani Turkic, Persian, Turkish, and English. Spoken and written communication, guest relations, and public & corporate liaison."
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowShareButtons = true
  homeInfoParams = true
  ShowToc = true

[params.profileMode]
  enabled = true
  title = "Pirikli"
  subtitle = "Multilingual Communication Specialist — Spoken & Written Communication"
  imageUrl = "images/profile.jpg"
  imageWidth = 140
  imageHeight = 140
  imageTitle = "Pirikli"

  [[params.profileMode.buttons]]
    name = "LinkedIn"
    url = "https://linkedin.com/in/pirikli"

  [[params.profileMode.buttons]]
    name = "Instagram"
    url = "https://instagram.com/pirikli_"


[params.assets]
  customCSS = ["css/custom.css"]

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions]
    table = true
    linkify = true
    strikethrough = true
    taskList = true
    typographer = true
    autoHeadingID = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

paginate = 5
paginatePath = "page"

[params.seo]
  enable = true
  image = "images/profile.jpg"
  keywords = ["Multilingual Communication Specialist","Guest Relations","Public Relations","Corporate Liaison","Azerbaijani Turkic","Persian","Turkish","English"]
  description = "Multilingual Communication Specialist working across Azerbaijani Turkic, Persian, Turkish, and English."

[menu]
[[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 1

[[menu.main]]
    identifier = "cv"
    name = "CV"
    url = "https://docs.google.com/document/d/10cFlNYZAG7DRQZeejDcRk1CdCQc05HWL/edit?usp=drive_link&ouid=106570548915121525213&rtpof=true&sd=true"
    weight = 2