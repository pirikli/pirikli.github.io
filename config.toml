baseURL = "https://pirikli.github.io/"
languageCode = "en-us"
title = "Pirikli"
theme = "PaperMod"
defaultContentLanguage = "en"
relativeURLs = true
canonifyURLs = true

# -----------------------
# Languages
# -----------------------
#[languages]
#  [languages.en]
#    title = "Pirikli"
#    languageName = "English"
#    weight = 1
#
#  [languages.fr]
#    title = "Pirikli FR"
#    languageName = "Français"
#    weight = 2

# -----------------------
# Site Parameters
# -----------------------
[params]
  author = "Pirikli"
  description = "Multilingual writer and storyteller working in Azerbaijani Turkic, Persian, and English. Creative non-fiction, poetry, official writing, translation, and short-form scripts."
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowShareButtons = true
  homeInfoParams = true
  ShowToc = true
  mainSections = ["projects", "learning"]

# -----------------------
# Profile Mode
# -----------------------
[params.profileMode]
  enabled = true
  title = "Pirikli"
  subtitle = "Multilingual Writer & Storyteller — Turkic · Persian · English"
  imageUrl = "images/profile.jpg"
  imageWidth = 140
  imageHeight = 140
  imageTitle = "Pirikli"


  [[params.profileMode.buttons]]
    name = "Read my writing"
    url = "https://substack.com/pirikli"
    
  [[params.profileMode.buttons]]
    name = "Freelance services"
    url = "/about/"
    

# -----------------------
# Assets - CSS
# -----------------------
[params.assets]
  customCSS = ["css/custom.css"]

# -----------------------
# Markup / Rendering
# -----------------------
[markup]
  defaultMarkdownHandler = "goldmark"

  [markup.goldmark.renderer]
    unsafe = true

  [markup.goldmark.extensions]
    table = true
    linkify = true
    strikethrough = true
    taskList = true
    typographer = true
    autoHeadingID = true

  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# -----------------------
# Pagination
# -----------------------
paginate = 5
paginatePath = "page"

# -----------------------
# SEO / Social Sharing
# -----------------------
[params.seo]
  enable = true
  twitter = "https://x.com/pirikli"
  facebook = "https://facebook.com/pirikli"
  image = "images/profile.jpg"
  keywords = ["Multilingual Writer","Storyteller","Creative Non-Fiction","Azerbaijani Turkic","Poetry","CV Writing","Ghostwriting"]
  description = "Multilingual writer and storyteller working in Azerbaijani Turkic, Persian, and English."

# -----------------------
# Menu Items
# -----------------------
[menu]

[[menu.main]]
    identifier = "about"
    name = "About & Services"
    url = "/about/"
    weight = 1

[[menu.main]]
    identifier = "substack"
    name = "Writing"
    url = "https://substack.com/pirikli"
    weight = 2

